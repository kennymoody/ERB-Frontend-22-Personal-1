<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Attributes</title>
  </head>
  <body>
    <h1>Global Attributes</h1>
    <!-- Global Attributes -->
    <!-- Class -->
    <h2 class="text-xl">Heading 1</h2>
    <!-- ID -->
    <h2 id="heading-2">Heading 2</h2>
    <!-- Style -->
    <h2 style="color: red; text-decoration: underline">Heading 3</h2>
    <!-- Title -->
    <h2 title="This is heading 4">Heading 4</h2>
    <!-- Hidden -->
    <h2 hidden>Hidden Heading 5</h2>
    <!-- Content Editable -->
    <h2 contenteditable="true">Content Editable Heading 6</h2>
    <!-- Draggable -->
    <h2 draggable="true">Draggable Heading 7</h2>
    <!-- SVG -->
    <svg width="500px" height="500px">
      <circle
        cx="200"
        cy="200"
        r="100"
        stroke="black"
        stroke-width="3"
        fill="red"
      />
      <circle
        cx="300"
        cy="200"
        r="100"
        stroke="black"
        stroke-width="3"
        fill="orange"
      />
      <text x="240" text-anchor="middle" y="210" fill="white" font-size="45px">
        Master Card
      </text>
    </svg>
  </body>
</html>
