<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/shoes.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Story+Script&display=swap"
      rel="stylesheet"
    />
    <title>Shoes</title>
  </head>
  <body>
    <main class="mainframe">
      <h1 class="story-script-regular">Shoes - Your favorite shoes</h1>
      <!-- Sporty Card -->
      <article class="card">
        <header class="header-sporty">Keep It Sporty</header>
        <section class="card-content">
          Clothing to keep you active and health
        </section>
        <button class="button-sporty">View Collection</button>
        <aside>
          <img src="./IMG/shoes_sporty.png" alt="sporty shoes" width="100px" />
        </aside>
      </article>
      <!-- Casual Card -->
      <article class="card">
        <header class="header-casual">Keep It Casual</header>
        <section class="card-content">Shoes to keep you comfortable</section>
        <button class="button-casual">View Collection</button>
        <aside>
          <img src="./IMG/shoes_casual.png" alt="causal shoes" width="100px" />
        </aside>
      </article>
      <!-- Formal Card -->
      <article class="card">
        <header class="header-formal">Keep It Formal</header>
        <section class="card-content">
          Shoes to keep you looking sharp and confident
        </section>
        <button class="button-formal">View Collection</button>
        <aside>
          <img src="./IMG/shoes_formal.png" alt="formal shoes" width="100px" />
        </aside>
      </article>
    </main>
  </body>
</html>
