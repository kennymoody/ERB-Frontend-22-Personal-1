<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./CSS/shopping-list.css" />
    <title>JS - Shopping List</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <img src="./IMG/amazon-ar21.svg" alt="" />
        </div>
        <h1 id="app-title">Shopping List</h1>
        <!-- <h2><a href="http://www.google.com">LINK HERE</a></h2> -->
      </header>
      <form action="" id="item-form">
        <div class="form-control">
          <input
            type="text"
            id="item-input"
            class="item-input"
            name="item"
            placeholder="Enter Item"
          />
        </div>
        <!-- Select Input -->
        <select
          name="priority"
          id="priority-input"
          class="item-input form-input"
        >
          <option value="0">Select Priority</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
        <br />
        <!-- check box -->
        <input type="checkbox" class="checkout" id="checkbox" />Recurring
        Item<br />
        <div class="form-control">
          <button class="btn" type="submit">
            <i class="fa-solid fa-plus"></i>Add Item
          </button>
        </div>
      </form>
      <div class="filter">
        <input
          type="text"
          class="form-input-filter"
          id="filter"
          placeholder="Filter Items"
        />
        <ul class="items parent" id="item-list">
          <!-- this is a comment for nodelist -->
          <li class="item">
            1.Apple
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            2.Vivo
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            3.Xiaomi
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            4.Huawei
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            5.Samsung
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            6.Oppo
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
        </ul>
        <button id="clear" class="btn-clear">Clear All</button>
      </div>
    </div>
