<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./CSS/shopping-list.css" />
    <title>JS - Shopping List</title>
  </head>
  <body>
    <div class="container">
      <header>
        <img src="./IMG/amazon-ar21.svg" alt="" />
        <h1 id="app-title">Shopping List</h1>
        <!-- <h2><a href="http://www.google.com">LINK HERE</a></h2> -->
      </header>
      <form action="" id="item-form">
        <div class="form-control">
          <input
            type="text"
            id="item-input"
            class="item-input"
            name="item"
            placeholder="Enter Item"
          />
        </div>
        <div class="form-control">
          <button class="btn" type="submit">
            <i class="fa-solid fa-plus"></i>Add Item
          </button>
        </div>
      </form>
      <div class="filter">
        <input
          type="text"
          class="form-input-filter"
          id="filter"
          placeholder="Filter Items"
        />
        <ul class="items parent" id="item-list">
          <!-- this is a comment for nodelist -->
          <li class="item">
            Apple
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            Vivo
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            Xiaomi
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            Huawei
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            Samsung
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
          <li class="item">
            Oppo
            <button class="remove-item btn-link text-red">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </li>
        </ul>
        <button id="clear" class="btn-clear">Clear All</button>
      </div>
    </div>
    <!-- <script src="./JS/shopping-list.js"></script> -->
    <!-- <script src="./JS/select-element.js"></script> -->
    <!-- <script src="./JS/select-nodelist.js"></script> -->
    <!-- <script src="./JS/select-multiple.js"></script> -->
    <!-- <script src="./JS/traversing-element.js"></script> -->
    <!-- <script src="./JS/create-element.js"></script> -->
     <script src="./JS/refactor-create-element.js"></script>
  </body>
</html>
